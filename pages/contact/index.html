<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us — The Print Loom</title>
<meta name="description" content="Get in touch with The Print Loom for order support, wholesale enquiries, or feedback.">
<link rel="canonical" href="https://theprintloom.example.com/pages/contact/index.html">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/variables.css">
<link rel="stylesheet" href="/css/base.css">
<link rel="stylesheet" href="/css/layout.css">
<link rel="stylesheet" href="/css/components.css">
<link rel="stylesheet" href="/css/pages.css">
<link rel="stylesheet" href="/css/animations.css">
<link rel="stylesheet" href="/css/utilities.css">
</head>
<body>

<div id="site-header"></div>

<main id="main-content" class="page-main">
  <div class="container">
    <nav class="breadcrumbs"><a href="/index.html">Home</a> / <span>Contact</span></nav>
    <h1>Get in Touch</h1>
    <p class="text-soft mt-2" style="max-width:60ch;">Questions about an order, a fabric, or a bulk enquiry? We usually respond within one business day.</p>

    <div class="contact-grid mt-7">
      <div>
        <div class="contact-info-item">
          <span>📞</span>
          <div><strong>Phone / WhatsApp</strong><p class="text-soft" id="contact-phone"></p></div>
        </div>
        <div class="contact-info-item">
          <span>✉️</span>
          <div><strong>Email</strong><p class="text-soft" id="contact-email"></p></div>
        </div>
        <div class="contact-info-item">
          <span>📍</span>
          <div><strong>Studio</strong><p class="text-soft" id="contact-address"></p></div>
        </div>
        <div class="contact-info-item">
          <span>🕐</span>
          <div><strong>Support Hours</strong><p class="text-soft">Mon–Sat, 10 AM – 6:30 PM IST</p></div>
        </div>
      </div>

      <form id="contact-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="cn-name">Name</label>
          <input type="text" id="cn-name" class="form-input" required>
          <span class="form-error" data-error-for="name"></span>
        </div>
        <div class="form-group">
          <label class="form-label" for="cn-email">Email</label>
          <input type="email" id="cn-email" class="form-input" required>
          <span class="form-error" data-error-for="email"></span>
        </div>
        <div class="form-group">
          <label class="form-label" for="cn-subject">Subject</label>
          <input type="text" id="cn-subject" class="form-input" required>
          <span class="form-error" data-error-for="subject"></span>
        </div>
        <div class="form-group">
          <label class="form-label" for="cn-message">Message</label>
          <textarea id="cn-message" class="form-textarea" rows="5" required></textarea>
          <span class="form-error" data-error-for="message"></span>
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="contact-submit">Send Message</button>
      </form>
    </div>
  </div>
</main>

<div id="site-footer"></div>

<script type="module">
  import { initApp } from '/js/app.js';
  import { api } from '/js/services/api.js';
  import { validateForm, validators } from '/js/services/validation.js';
  import { showToast } from '/js/components/toast.js';

  async function loadContactDetails() {
    try {
      const settings = await api.getSettings();
      document.getElementById('contact-phone').textContent = settings.brand.supportPhone;
      document.getElementById('contact-email').textContent = settings.brand.supportEmail;
      document.getElementById('contact-address').textContent = settings.brand.address;
    } catch {
      document.getElementById('contact-phone').textContent = '+91 90000 00000';
      document.getElementById('contact-email').textContent = 'hello@theprintloom.in';
      document.getElementById('contact-address').textContent = 'Ahmedabad, Gujarat, India';
    }
  }

  const schema = {
    name: validators.name,
    email: validators.email,
    subject: (v) => validators.minLength(v, 3, 'Subject'),
    message: (v) => validators.minLength(v, 10, 'Message'),
  };

  document.getElementById('contact-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const data = {
      name: document.getElementById('cn-name').value,
      email: document.getElementById('cn-email').value,
      subject: document.getElementById('cn-subject').value,
      message: document.getElementById('cn-message').value,
    };
    const { valid, errors } = validateForm(data, schema);
    document.querySelectorAll('[data-error-for]').forEach((el) => { el.textContent = ''; });
    Object.entries(errors).forEach(([field, msg]) => {
      document.querySelector(`[data-error-for="${field}"]`).textContent = msg;
    });
    if (!valid) return;

    const btn = document.getElementById('contact-submit');
    btn.disabled = true;
    btn.textContent = 'Sending…';
    try {
      await api.sendContactMessage(data);
      showToast('Message sent! We will get back to you shortly.', 'success');
      e.target.reset();
    } catch (err) {
      showToast(err.message || 'Could not send message right now.', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Send Message';
    }
  });

  await initApp();
  await loadContactDetails();
</script>

</body>
</html>
